<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Bio</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5 text-center">

                    <img src="https://avatars.githubusercontent.com/u/0?v=4"
                         class="rounded-circle mb-3"
                         width="120"
                         height="120"
                         alt="Profile Picture">

                    <h1 class="fw-bold">Hi, I'm Akihiko 👋</h1>
                    <p class="text-muted">Web Developer • Designer • Lifelong Learner</p>

                    <p class="mt-4">
                        I enjoy creating responsive websites, exploring new technologies,
                        and designing clean user experiences. I'm continuously learning
                        and building projects to improve my skills.
                    </p>

                    <div class="d-flex flex-wrap justify-content-center gap-2 my-4">
                        <span class="badge bg-primary">HTML</span>
                        <span class="badge bg-success">CSS</span>
                        <span class="badge bg-warning text-dark">JavaScript</span>
                        <span class="badge bg-info text-dark">Bootstrap</span>
                        <span class="badge bg-dark">Git</span>
                    </div>

                    <a href="https://github.com/yourusername" class="btn btn-dark me-2">
                        GitHub
                    </a>
                    <a href="mailto:you@example.com" class="btn btn-outline-secondary">
                        Contact
                    </a>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
